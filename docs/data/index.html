<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fun sport nexus task board</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">fun sport nexus</p>
        <h1>GitHub Project 連携タスクボード</h1>
        <p class="lead">GitHub Project を正本にして、GitHub Pages では最新のタスク状況を一覧表示します。</p>
      </div>
      <div class="hero-actions">
        <button id="reloadBtn" class="btn primary">再読み込み</button>
      </div>
    </header>

    <section class="panel summary-panel">
      <div class="summary-head">
        <div>
          <h2 id="projectTitle">読み込み中...</h2>
          <p id="generatedAt" class="muted">データ取得中です</p>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </section>

    <section class="filters panel">
      <div class="filter-field">
        <label for="searchInput">検索</label>
        <input id="searchInput" type="text" placeholder="タイトル / 担当 / メモ" />
      </div>
      <div class="filter-field">
        <label for="eventFilter">Event</label>
        <select id="eventFilter"><option value="all">すべて</option></select>
      </div>
      <div class="filter-field">
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter"><option value="all">すべて</option></select>
      </div>
      <div class="filter-field">
        <label for="statusFilter">Status</label>
        <select id="statusFilter"><option value="all">すべて</option></select>
      </div>
      <div class="filter-field">
        <label for="priorityFilter">Priority</label>
        <select id="priorityFilter"><option value="all">すべて</option></select>
      </div>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Event</th>
              <th>Category</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Due</th>
              <th>Owner</th>
            </tr>
          </thead>
          <tbody id="taskTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty hidden">
        まだ表示できるタスクがありません。GitHub Project の項目を追加してから、Actions で tasks.json を更新してください。
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
